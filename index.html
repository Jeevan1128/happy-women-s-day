<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Women's Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Great Vibes', cursive;
            background: linear-gradient(to right, #7b1fa2, #ab47bc);
            color: white;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            margin-top: 20%;
            font-size: 3em;
        }
        #greeting {
            display: none;
            margin-top: 20%;
        }
        .heart {
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: pink;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        #popped-message {
            display: none;
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div id="loading-page">
        <h1>Loading...</h1>
    </div>

    <div id="greeting">
        <h1>Happy Women's Day!</h1>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <input type="file" id="imageUpload">
        <button id="startGame">Start Game</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                document.getElementById('loading-page').style.display = 'none';
                document.getElementById('greeting').style.display = 'block';
            }, 2000);

            document.getElementById('startGame').addEventListener('click', function() {
                const heartsCount = 20;
                for (let i = 0; i < heartsCount; i++) {
                    createHeart();
                }
            });
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * window.innerWidth + 'px';
            heart.style.top = Math.random() * window.innerHeight + 'px';
            heart.addEventListener('click', function() {
                heart.style.display = 'none';
                revealMessage();
            });
            document.body.appendChild(heart);
        }

        function revealMessage() {
            const messages = ['You are amazing!', 'Keep shining!', 'Believe in yourself!', 'You are loved!'];
            const message = messages[Math.floor(Math.random() * messages.length)];
            const messageDiv = document.createElement('div');
            messageDiv.id = 'popped-message';
            messageDiv.innerText = message;
            document.body.appendChild(messageDiv);
            messageDiv.style.display = 'block';
            setTimeout(() => messageDiv.remove(), 3000);
        }
    </script>
</body>
</html>
