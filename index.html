<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Happy Women's Day</title>
</head>
<body>

<div id="loadingPage" class="page">
    <h1>Welcome!</h1>
    <h2>Loading...</h2>
    <script>
        setTimeout(() => {
            document.getElementById('loadingPage').style.display = 'none';
            document.getElementById('greetingPage').style.display = 'block';
        }, 3000);
    </script>
</div>

<div id="greetingPage" class="page" style="display:none;">
    <h1>Happy Women's Day!</h1>
    <input type="text" id="nameInput" placeholder="Enter your name" />
    <input type="file" id="imageInput" accept="image/*" />
    <button onclick="submitGreeting()">Submit</button>
    <div id="greetingOutput" style="margin-top: 20px;"></div>
</div>

<div id="gamePage" class="page" style="display:none;">
    <h2>Popping Hearts Game!</h2>
    <div id="heartContainer"></div>
    <script>
        function createHearts() {
            for (let i = 0; i < 6; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.onclick = () => revealMessage(heart);
                document.getElementById('heartContainer').appendChild(heart);
            }
        }

        function revealMessage(heart) {
            heart.innerHTML = '<img src="photo-url.jpg" alt="Message" class="messageImage" />';
            heart.onclick = null;
        }

        function submitGreeting() {
            const name = document.getElementById('nameInput').value;
            const image = document.getElementById('imageInput').files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                document.getElementById('greetingOutput').innerHTML = `<p>Hello, ${name}!</p><img src="${event.target.result}" alt="Your Image" height="100px" />`;
                document.getElementById('greetingPage').style.display = 'none';
                document.getElementById('gamePage').style.display = 'block';
                createHearts();
            };

            if (image) {
                reader.readAsDataURL(image);
            }
        }
    </script>
</div>

</body>
</html>
